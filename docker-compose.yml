services:
  postgres:
    image: postgres:16-alpine
    container_name: gestion-ejecutivos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: FCMOLvyg1ZsbFCRvD9Y1
      POSTGRES_DB: gestion_ejecutivos
    volumes:
      - gestion-ejecutivos-db-data:/var/lib/postgresql/data
    networks:
      - gestion-ejecutivos-net

  backend:
    build: .
    container_name: gestion-ejecutivos-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: FCMOLvyg1ZsbFCRvD9Y1
      DB_NAME: gestion_ejecutivos
      DB_SYNC: "true"
      JWT_SECRET: b166d22f55b533d03b46d87158bc1dc467b06cffc94791684d03d82824d67b62
      ADMIN_EMAIL: admin@empresa.com
      ADMIN_PASSWORD: ic8DqTG0VTU86KLegg8Z
      PORT: 3000
    command: sh -c "node dist/seed/seed.js || true; node dist/main.js"
    networks:
      - gestion-ejecutivos-net

volumes:
  gestion-ejecutivos-db-data:

networks:
  gestion-ejecutivos-net:
    external: true
